<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2e7d32" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="favicon-192.png" />
    <title>Projeto-Rotina</title>
  </head>
  <body>
    <header>
      <div class="header-container">
        <section class="horaAtual">
          <h1 id="date"></h1>
        </section>
        <div class="Hora">
          <h2 id="horas"></h2>
        </div>
        <div class="logo"></div>
        <div class="progresso-dia">
          <h2><span>Progresso</span> De Hoje</h2>
          <p id="porcentagem">0%</p>
          <div id="barra-progresso">
            <div id="barra"></div>
          </div>
        </div>
      </div>
    </header>
    <main>
      <div class="main-container">
        <h2>Adicione Suas <span>Atividades</span></h2>
        <button class="botao-adicionar">+</button>
      </div>
    </main>
    <div id="listaTarefas"></div>
    <div class="text-area">
      <h2>detalhes <span> do dia</span></h2>

      <textarea
        name="detalhes do dia"
        id="reflexao"
        placeholder="detalhes do seu dia."
      ></textarea>

      <button class="botao" onclick="salvarReflexao()">Salvar Texto</button>
    </div>

    <script type="module" src="js/main.js"></script>
    <script src="textArea.js"></script>
  </body>
</html>
